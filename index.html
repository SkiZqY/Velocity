<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity - 为电竞而生</title>
    <link rel="icon" href="Velocity/assets/logo.png" type="image/png">
    <link rel="stylesheet" href="Velocity/style.css">
</head>
<body>
    <!-- 英雄区域 -->
    <section id="home" class="hero">
        <!-- 背景动画 -->
        <div class="background-animation">
            <!-- 粒子效果 -->
            <div class="particles-container" id="particles-container"></div>
            
            <!-- 速度线条 -->
            <div class="velocity-lines">
                <div class="velocity-line line-1"></div>
                <div class="velocity-line line-2"></div>
                <div class="velocity-line line-3"></div>
                <div class="velocity-line line-4"></div>
            </div>

            <div class="gradient-bg"></div>
        </div>
        
        <div class="container">
            <div class="hero-content">
                <div class="hero-header">
                    <img src="Velocity/assets/logo.png" alt="Velocity Tools" class="hero-logo">

                </div>
                <p>为电竞而生 打造最完美的电竞体验！</p>
                <div class="hero-buttons">
                    <a href="#" class="btn primary">立即下载</a>
                </div>
            </div>
        </div>
        
        <!-- 关于区域 -->
        <div id="about" class="about">
            <p>Velocity 是由湖南深科电竞网络科技有限公司开发的专业电竞系统优化工具，致力于为电竞玩家提供最完美的游戏体验。我们的团队由一群热爱电竞的技术专家组成，不断优化和改进产品，为玩家带来更好的游戏体验。</p>
            <div class="social-links">
                <a href="https://space.bilibili.com/1163175166" target="_blank">
                    <img src="Velocity/assets/B站.svg" alt="B站">
                    <span>B站</span>
                </a>
                <a href="https://v.douyin.com/ZV-DTWVcbu4/" target="_blank">
                    <img src="Velocity/assets/抖音.svg" alt="抖音">
                    <span>抖音</span>
                </a>
                <a href="https://qm.qq.com/q/GF28ta5nW2" target="_blank">
                    <img src="Velocity/assets/QQ.svg" alt="QQ群">

            <div class="copyright">
                <p>&copy; 2026 湖南深科电竞网络科技有限公司. 保留所有权利.</p>
